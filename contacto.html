<div class="page-head">
  <div class="eyebrow">Contacto</div>
  <h1>¿Tienes una duda?</h1>
</div>

<div class="form-wrap" style="padding-top:20px;">
  <a class="btn btn-primary btn-block" id="wa-contacto-link" href="#" target="_blank" rel="noopener" style="margin-bottom:20px;">💬 Escríbenos por WhatsApp</a>  
<form class="panel" id="form-contacto">
    <div class="field"><label>Nombre</label><input type="text" id="contacto-nombre" placeholder="Tu nombre" required></div>
    <div class="field"><label>Correo</label><input type="email" id="contacto-correo" placeholder="tú@correo.com" required></div>
    <div class="field"><label>Teléfono</label><input type="tel" id="contacto-telefono" placeholder="55 1234 5678"></div>
    <div class="field"><label>Mensaje</label><textarea id="contacto-mensaje" placeholder="¿En qué te ayudamos?" required></textarea></div>
    <button class="btn btn-outline btn-block" type="submit">Enviar mensaje</button>
    <p id="contacto-feedback" class="form-feedback"></p>
</form>

  <div class="row2" id="contacto-sucursales" style="margin-top:24px;">
    <p style="color:var(--grey); grid-column:1/-1; text-align:center;">Cargando sucursales…</p>
  </div>
</div>

<footer class="footer-simple">© Niza Isabela Pastelería — Amecameca, México</footer>
